asyncapi: 3.0.0

info:
  title: gChess WebSocket API
  version: 2.2.0
  description: |
    Real-time WebSocket API for gChess chess application.

    Provides real-time communication for:
    - Matchmaking (instant match notifications for human vs human)
    - Gameplay (move execution, game state sync)
    - Spectators (observe games in real-time)

    **Authentication**: All WebSocket connections require JWT authentication.
    The JWT token must be provided either as a query parameter (?token=...)
    or in the Sec-WebSocket-Protocol header.

    **Architecture**:
    - Matchmaking: Indexed by UserId (permanent user identity)
    - Gameplay: Indexed by PlayerId (per-game participation)
    - Spectators: Indexed by UserId (observers, not participants)
    - Authentication: Managed by WebSocketJwtAuth (shared kernel) across all contexts

  contact:
    name: Guillaume Bourquet
    email: gbourquet@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  development:
    host: localhost:8080
    protocol: ws
    description: Development server (WebSocket)
  production:
    host: gchess.example.com
    protocol: wss
    description: Production server (WebSocket Secure)

channels:
  matchmaking:
    address: /ws/matchmaking
    description: |
      WebSocket channel for matchmaking (human vs human).

      Users join the queue and receive notifications when matched with another player with a compatible time control.

      **Authentication**: JWT required
      **Connection scope**: One connection per UserId
    messages:
      AuthSuccess:
        $ref: '#/components/messages/AuthSuccess'
      AuthFailed:
        $ref: '#/components/messages/AuthFailed'
      JoinQueue:
        $ref: '#/components/messages/JoinQueue'
      QueuePositionUpdate:
        $ref: '#/components/messages/QueuePositionUpdate'
      MatchFound:
        $ref: '#/components/messages/MatchFound'
      MatchmakingError:
        $ref: '#/components/messages/MatchmakingError'
      Error:
        $ref: '#/components/messages/Error'

  game:
    address: /ws/game/{gameId}
    description: |
      WebSocket channel for participating in a game.
      Players send moves and receive game state updates in real-time.

      **Authentication**: JWT required
      **Connection scope**: One connection per PlayerId (participation)
      **Multi-device**: A user can have multiple connections (different games)
    parameters:
      gameId:
        description: Unique identifier of the game (ULID format)
        example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
    messages:
      AuthSuccess:
        $ref: '#/components/messages/AuthSuccess'
      AuthFailed:
        $ref: '#/components/messages/AuthFailed'
      MoveAttempt:
        $ref: '#/components/messages/MoveAttempt'
      MoveExecuted:
        $ref: '#/components/messages/MoveExecuted'
      MoveRejected:
        $ref: '#/components/messages/MoveRejected'
      GameStateSync:
        $ref: '#/components/messages/GameStateSync'
      PlayerDisconnected:
        $ref: '#/components/messages/PlayerDisconnected'
      PlayerReconnected:
        $ref: '#/components/messages/PlayerReconnected'
      Resign:
        $ref: '#/components/messages/Resign'
      GameResigned:
        $ref: '#/components/messages/GameResigned'
      OfferDraw:
        $ref: '#/components/messages/OfferDraw'
      DrawOffered:
        $ref: '#/components/messages/DrawOffered'
      AcceptDraw:
        $ref: '#/components/messages/AcceptDraw'
      DrawAccepted:
        $ref: '#/components/messages/DrawAccepted'
      RejectDraw:
        $ref: '#/components/messages/RejectDraw'
      DrawRejected:
        $ref: '#/components/messages/DrawRejected'
      ClaimTimeout:
        $ref: '#/components/messages/ClaimTimeout'
      TimeoutConfirmed:
        $ref: '#/components/messages/TimeoutConfirmed'
      TimeoutClaimRejected:
        $ref: '#/components/messages/TimeoutClaimRejected'
      Error:
        $ref: '#/components/messages/Error'

  spectate:
    address: /ws/game/{gameId}/spectate
    description: |
      WebSocket channel for observing a game (read-only).
      Spectators receive all game events but cannot send moves.

      **Authentication**: JWT required
      **Connection scope**: One connection per UserId (observer)
      **Permissions**: Read-only (no client → server messages)
    parameters:
      gameId:
        description: Unique identifier of the game to observe (ULID format)
        example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
    messages:
      AuthSuccess:
        $ref: '#/components/messages/AuthSuccess'
      AuthFailed:
        $ref: '#/components/messages/AuthFailed'
      GameStateSync:
        $ref: '#/components/messages/GameStateSync'
      MoveExecuted:
        $ref: '#/components/messages/MoveExecuted'
      PlayerDisconnected:
        $ref: '#/components/messages/PlayerDisconnected'
      PlayerReconnected:
        $ref: '#/components/messages/PlayerReconnected'
      GameResigned:
        $ref: '#/components/messages/GameResigned'
      DrawAccepted:
        $ref: '#/components/messages/DrawAccepted'
      TimeoutConfirmed:
        $ref: '#/components/messages/TimeoutConfirmed'

components:
  messages:
    # ========== Authentication Messages ==========
    AuthSuccess:
      summary: Authentication successful
      description: Sent by server immediately after successful JWT validation
      payload:
        type: object
        required: [type, userId]
        properties:
          type:
            type: string
            const: AuthSuccess
          userId:
            type: string
            description: User ID (ULID format)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    AuthFailed:
      summary: Authentication failed
      description: Sent by server when JWT validation fails
      payload:
        type: object
        required: [type, reason]
        properties:
          type:
            type: string
            const: AuthFailed
          reason:
            type: string
            description: Reason for authentication failure
            example: 'Invalid or expired token'

    # ========== Matchmaking Messages ==========
    JoinQueue:
      summary: Join matchmaking queue
      description: |
        Client → Server. User requests to join matchmaking.
        User joins the queue and waits for an opponent with a compatible time control.

        **Time control (Fischer)**: optional. Both players must request the same
        `totalTimeMinutes` and `incrementSeconds` to be matched together.
        Set `totalTimeMinutes` to `0` (default) for unlimited games.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: JoinQueue
          totalTimeMinutes:
            type: integer
            description: |
              Total time per player in minutes (Fischer clock).
              `0` means unlimited (no clock). Default: `0`.
            minimum: 0
            default: 0
            example: 5
          incrementSeconds:
            type: integer
            description: |
              Increment added to the player's clock after each move, in seconds.
              Default: `0` (no increment).
            minimum: 0
            default: 0
            example: 3

    QueuePositionUpdate:
      summary: Queue position update
      description: Server → Client. Current position in the matchmaking queue
      payload:
        type: object
        required: [type, position]
        properties:
          type:
            type: string
            const: QueuePositionUpdate
          position:
            type: integer
            description: Current position in queue (1-indexed)
            minimum: 1
            example: 1

    MatchFound:
      summary: Match found
      description: |
        Server → Client. Match found and game created.
        Client should disconnect from matchmaking and connect to /ws/game/{gameId}
      payload:
        type: object
        required: [type, gameId, yourColor, playerId]
        properties:
          type:
            type: string
            const: MatchFound
          gameId:
            type: string
            description: ID of the created game (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          yourColor:
            type: string
            description: Color assigned to this player
            enum: [WHITE, BLACK]
            example: 'WHITE'
          playerId:
            type: string
            description: PlayerId for this participation (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          opponentUserId:
            type: string
            description: Opponent's UserId (optional, for display).
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    MatchmakingError:
      summary: Matchmaking error
      description: Server → Client. Error during matchmaking process
      payload:
        type: object
        required: [type, code, message]
        properties:
          type:
            type: string
            const: MatchmakingError
          code:
            type: string
            description: Error code
            example: 'ALREADY_IN_QUEUE'
          message:
            type: string
            description: Human-readable error message
            example: 'User is already in the matchmaking queue'

    # ========== Gameplay Messages ==========
    MoveAttempt:
      summary: Attempt to make a move
      description: Client → Server. Player attempts to make a move
      payload:
        type: object
        required: [type, from, to]
        properties:
          type:
            type: string
            const: MoveAttempt
          from:
            type: string
            description: Starting position (algebraic notation)
            pattern: '^[a-h][1-8]$'
            example: 'e2'
          to:
            type: string
            description: Destination position (algebraic notation)
            pattern: '^[a-h][1-8]$'
            example: 'e4'
          promotion:
            type: string
            description: Piece to promote to (for pawn promotion)
            enum: [QUEEN, ROOK, BISHOP, KNIGHT]
            example: 'QUEEN'

    MoveExecuted:
      summary: Move executed successfully
      description: |
        Server → Client. Move validated and executed.
        Broadcast to both players and all spectators.
      payload:
        type: object
        required: [type, move, newPositionFen, gameStatus, currentSide, isCheck]
        properties:
          type:
            type: string
            const: MoveExecuted
          move:
            $ref: '#/components/schemas/Move'
          newPositionFen:
            type: string
            description: New board position in FEN notation
            example: 'rnbqkbnr/pppppppp/8/8/4P3/8/PPPP1PPP/RNBQKBNR b KQkq e3 0 1'
          gameStatus:
            type: string
            description: Current game status
            enum: [IN_PROGRESS, CHECK, CHECKMATE, STALEMATE, DRAW, RESIGNED, TIMEOUT]
            example: 'IN_PROGRESS'
          currentSide:
            type: string
            description: Whose turn it is now
            enum: [WHITE, BLACK]
            example: 'BLACK'
          isCheck:
            type: boolean
            description: |
              True if the current player (currentSide) is in check.
              Useful for UI feedback to highlight the king in danger.
            example: false
          whiteTimeRemainingMs:
            type: integer
            format: int64
            description: |
              White player's remaining clock time in milliseconds after this move.
              `null` for unlimited games.
            example: 297000
          blackTimeRemainingMs:
            type: integer
            format: int64
            description: |
              Black player's remaining clock time in milliseconds after this move.
              `null` for unlimited games.
            example: 300000

    MoveRejected:
      summary: Move rejected (invalid)
      description: |
        Server → Client. Move validation failed.
        Sent only to the player who attempted the move.
      payload:
        type: object
        required: [type, reason]
        properties:
          type:
            type: string
            const: MoveRejected
          reason:
            type: string
            description: Reason for rejection
            example: 'Not your turn'

    GameStateSync:
      summary: Complete game state synchronization
      description: |
        Server → Client. Full game state.
        Sent on connection, reconnection, or explicit request.
      payload:
        type: object
        required: [type, gameId, positionFen, moveHistory, gameStatus, currentSide, whitePlayerId, blackPlayerId]
        properties:
          type:
            type: string
            const: GameStateSync
          gameId:
            type: string
            description: Game ID (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          positionFen:
            type: string
            description: Current board position in FEN notation
            example: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'
          moveHistory:
            type: array
            description: List of all moves played
            items:
              $ref: '#/components/schemas/Move'
          gameStatus:
            type: string
            description: Current game status
            enum: [IN_PROGRESS, CHECK, CHECKMATE, STALEMATE, DRAW, RESIGNED, TIMEOUT]
            example: 'IN_PROGRESS'
          currentSide:
            type: string
            description: Whose turn it is
            enum: [WHITE, BLACK]
            example: 'WHITE'
          totalTimeSeconds:
            type: integer
            description: |
              Total time per player in seconds (Fischer clock).
              `null` for unlimited games.
            example: 300
          incrementSeconds:
            type: integer
            description: |
              Increment per move in seconds.
              `null` for unlimited games.
            example: 3
          whiteTimeRemainingMs:
            type: integer
            format: int64
            description: |
              White player's remaining clock time in milliseconds.
              `null` for unlimited games.
            example: 300000
          blackTimeRemainingMs:
            type: integer
            format: int64
            description: |
              Black player's remaining clock time in milliseconds.
              `null` for unlimited games.
            example: 300000
          whitePlayerId:
            type: string
            description: PlayerId of white player (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          blackPlayerId:
            type: string
            description: PlayerId of black player (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    PlayerDisconnected:
      summary: Player disconnected
      description: Server → Client. A player disconnected from the game
      payload:
        type: object
        required: [type, playerId]
        properties:
          type:
            type: string
            const: PlayerDisconnected
          playerId:
            type: string
            description: PlayerId of the disconnected player (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    PlayerReconnected:
      summary: Player reconnected
      description: Server → Client. A player reconnected to the game
      payload:
        type: object
        required: [type, playerId]
        properties:
          type:
            type: string
            const: PlayerReconnected
          playerId:
            type: string
            description: PlayerId of the reconnected player (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    # ========== Resignation and Draw Messages ==========
    Resign:
      summary: Player resigns from the game
      description: |
        Client → Server. Player resigns, ending the game immediately.
        The resigning player loses the game.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: Resign

    GameResigned:
      summary: A player has resigned
      description: |
        Server → Client. A player resigned from the game.
        Broadcast to both players and all spectators.
        The game ends immediately with RESIGNED status.
      payload:
        type: object
        required: [type, resignedPlayerId, gameStatus]
        properties:
          type:
            type: string
            const: GameResigned
          resignedPlayerId:
            type: string
            description: PlayerId of the player who resigned (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          gameStatus:
            type: string
            const: RESIGNED
            description: Game status after resignation

    OfferDraw:
      summary: Offer a draw
      description: |
        Client → Server. Player offers a draw to their opponent.
        Only one draw offer can be pending at a time.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: OfferDraw

    DrawOffered:
      summary: Draw offer received
      description: |
        Server → Client. Sent to the opponent when a draw is offered.
        The opponent can respond with AcceptDraw or RejectDraw.
      payload:
        type: object
        required: [type, offeredByPlayerId]
        properties:
          type:
            type: string
            const: DrawOffered
          offeredByPlayerId:
            type: string
            description: PlayerId of the player who offered the draw (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    AcceptDraw:
      summary: Accept a draw offer
      description: |
        Client → Server. Player accepts a pending draw offer.
        The game ends immediately in a draw.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: AcceptDraw

    DrawAccepted:
      summary: Draw offer accepted
      description: |
        Server → Client. A draw offer has been accepted.
        Broadcast to both players and all spectators.
        The game ends immediately with DRAW status.
      payload:
        type: object
        required: [type, acceptedByPlayerId, gameStatus]
        properties:
          type:
            type: string
            const: DrawAccepted
          acceptedByPlayerId:
            type: string
            description: PlayerId of the player who accepted the draw (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          gameStatus:
            type: string
            const: DRAW
            description: Game status after accepting the draw

    RejectDraw:
      summary: Reject a draw offer
      description: |
        Client → Server. Player rejects a pending draw offer.
        The game continues normally.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: RejectDraw

    DrawRejected:
      summary: Draw offer rejected
      description: |
        Server → Client. Sent to the player who offered the draw.
        The draw offer has been rejected and the game continues.
      payload:
        type: object
        required: [type, rejectedByPlayerId]
        properties:
          type:
            type: string
            const: DrawRejected
          rejectedByPlayerId:
            type: string
            description: PlayerId of the player who rejected the draw (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'

    # ========== Timeout Messages ==========
    ClaimTimeout:
      summary: Claim opponent timeout
      description: |
        Client → Server. The waiting player asserts that the opponent's clock has reached zero.

        Can only be sent by the player who is **not** currently to move.
        The server computes the true remaining time and responds with either
        `TimeoutConfirmed` (broadcast) or `TimeoutClaimRejected` (private).

        Preconditions:
        - The game must be `IN_PROGRESS` or `CHECK`
        - The game must have an active time control (Fischer)
        - Both players must have completed their first move (≥ 2 moves in history),
          since each player's clock only starts after their own first move
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: ClaimTimeout

    TimeoutConfirmed:
      summary: Timeout confirmed — game over
      description: |
        Server → Client. The opponent's clock truly reached zero.
        Broadcast to both players and all spectators.
        WebSocket connections are closed ~1 second after this message.
      payload:
        type: object
        required: [type, loserPlayerId, gameStatus]
        properties:
          type:
            type: string
            const: TimeoutConfirmed
          loserPlayerId:
            type: string
            description: PlayerId of the player who ran out of time (ULID)
            example: '01HQZNR7X8A9C2D4E6F8G0H2J4'
          gameStatus:
            type: string
            const: TIMEOUT
            description: Game status after timeout

    TimeoutClaimRejected:
      summary: Timeout claim rejected — opponent still has time
      description: |
        Server → Client. Sent **only to the claimer** when the opponent still has time remaining.
        The client should use `remainingMs` to re-synchronise its local countdown timer.
      payload:
        type: object
        required: [type, remainingMs]
        properties:
          type:
            type: string
            const: TimeoutClaimRejected
          remainingMs:
            type: integer
            format: int64
            description: Opponent's true remaining clock time in milliseconds
            minimum: 1
            example: 4823

    # ========== Common Messages ==========
    Error:
      summary: Generic error
      description: Server → Client. Generic error message
      payload:
        type: object
        required: [type, code, message]
        properties:
          type:
            type: string
            const: Error
          code:
            type: string
            description: Error code
            example: 'INVALID_MESSAGE'
          message:
            type: string
            description: Human-readable error message
            example: 'Failed to parse message'

  schemas:
    Move:
      type: object
      description: Represents a chess move
      required: [from, to]
      properties:
        from:
          type: string
          description: Starting position (algebraic notation)
          pattern: '^[a-h][1-8]$'
          example: 'e2'
        to:
          type: string
          description: Destination position (algebraic notation)
          pattern: '^[a-h][1-8]$'
          example: 'e4'
        promotion:
          type: string
          description: Piece to promote to (for pawn promotion)
          enum: [QUEEN, ROOK, BISHOP, KNIGHT]
          example: 'QUEEN'

  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT authentication for WebSocket connections.

        The JWT token must be provided in one of two ways:
        1. Query parameter: ws://localhost:8080/ws/matchmaking?token=YOUR_JWT_TOKEN
        2. Sec-WebSocket-Protocol header: Bearer YOUR_JWT_TOKEN

        The token must contain a 'userId' claim.
        Token validity: 24 hours (configurable)
