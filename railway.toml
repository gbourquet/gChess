# Configuration Railway pour gChess
# https://docs.railway.com/reference/config-as-code

[build]
# Utilise le Dockerfile multi-stage à la racine du projet
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injecte PORT automatiquement — l'app le lit via EnvironmentConfig
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
